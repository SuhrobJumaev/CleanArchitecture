version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU13-ubuntu-20.04
    container_name: cleanarch-sqlserver
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - cleanarch-network

volumes:
  sqlserver-data:

networks:
  cleanarch-network:
    driver: bridge